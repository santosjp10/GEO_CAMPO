<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1d23">
    <title>GeoSense GNSS - Coleta Geoespacial</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet Draw CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />

    <style>
        :root {
            --bg-primary: #1a1d23;
            --bg-secondary: #21252b;
            --bg-surface: #282c34;
            --bg-elevated: #2c313a;
            --text-primary: #e1e4e8;
            --text-secondary: #a0a6b0;
            --text-muted: #6a7078;
            --accent: #4da6ff;
            --accent-glow: rgba(77, 166, 255, 0.3);
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
            --info: #60a5fa;
            --border: #3a3f4b;
            --border-light: #4a4f5b;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 50%;
            --fab-size: 48px;
            --fab-size-sm: 40px;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
            --safe-top: env(safe-area-inset-top, 8px);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        /* ===== MAP CONTAINER ===== */
        #map-container {
            position: absolute;
            inset: 0;
            z-index: 1;
        }
        #map {
            width: 100%;
            height: 100%;
            background: var(--bg-secondary);
        }

        /* ===== TOP BAR ===== */
        #top-bar {
            position: absolute;
            top: var(--safe-top);
            left: 10px;
            right: 10px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }
        #top-bar>* {
            pointer-events: auto;
        }
        .top-chip {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-primary);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            transition: var(--transition);
        }
        .top-chip.project-name {
            flex: 1;
            min-width: 0;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: -0.2px;
        }
        .top-chip.project-name span {
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .gnss-status-dot {
            width: 8px;
            height: 8px;
            border-radius: var(--radius-full);
            flex-shrink: 0;
            animation: pulse-dot 2s infinite;
        }
        .gnss-status-dot.fix {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }
        .gnss-status-dot.float {
            background: var(--warning);
            box-shadow: 0 0 8px var(--warning);
        }
        .gnss-status-dot.dgps {
            background: var(--info);
            box-shadow: 0 0 8px var(--info);
        }
        .gnss-status-dot.gps {
            background: var(--text-muted);
            box-shadow: 0 0 4px var(--text-muted);
        }
        .gnss-status-dot.off {
            background: var(--danger);
            box-shadow: 0 0 4px var(--danger);
        }
        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }
        #sat-count {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* ===== FAB BUTTONS (RIGHT SIDE) ===== */
        #fab-group {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        #fab-group>* {
            pointer-events: auto;
        }
        .fab {
            width: var(--fab-size);
            height: var(--fab-size);
            border-radius: var(--radius-full);
            background: var(--bg-surface);
            border: 1px solid var(--border);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
            font-size: 18px;
        }
        .fab:active {
            transform: scale(0.92);
            background: var(--bg-elevated);
        }
        .fab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .fab.capture-fab {
            width: 56px;
            height: 56px;
            background: var(--accent);
            border: 3px solid rgba(255, 255, 255, 0.3);
            font-size: 22px;
            color: #fff;
            box-shadow: 0 0 24px var(--accent-glow);
            animation: gentle-pulse 3s infinite;
        }
        @keyframes gentle-pulse {
            0%,
            100% {
                box-shadow: 0 0 24px var(--accent-glow);
            }
            50% {
                box-shadow: 0 0 40px rgba(77, 166, 255, 0.5);
            }
        }
        .fab-label {
            position: absolute;
            right: calc(100% + 10px);
            background: var(--bg-elevated);
            color: var(--text-primary);
            padding: 5px 10px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transform: translateX(6px);
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }
        .fab:hover .fab-label,
        .fab:active .fab-label {
            opacity: 1;
            transform: translateX(0);
        }

        /* ===== BOTTOM PANEL ===== */
        #bottom-panel {
            position: absolute;
            bottom: 12px;
            left: 10px;
            right: 10px;
            z-index: 10;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            max-height: 35vh;
            overflow-y: auto;
            transition: var(--transition);
            padding: 0;
            pointer-events: auto;
        }
        #bottom-panel.collapsed {
            max-height: 48px;
            overflow: hidden;
        }
        #panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            cursor: pointer;
            border-bottom: 1px solid transparent;
            transition: var(--transition);
            font-weight: 600;
            font-size: 13px;
            letter-spacing: -0.2px;
        }
        #bottom-panel:not(.collapsed) #panel-header {
            border-bottom-color: var(--border);
        }
        #panel-content {
            padding: 10px 14px 14px;
            font-size: 12px;
        }
        .coord-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .coord-item {
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            padding: 8px 10px;
            font-family: var(--font-mono);
            font-size: 11px;
        }
        .coord-item .label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 2px;
        }
        .coord-item .value {
            color: var(--text-primary);
            font-weight: 500;
            word-break: break-all;
        }
        .metric-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        .metric-badge {
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            padding: 6px 10px;
            font-size: 11px;
            font-family: var(--font-mono);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .metric-badge .dot {
            width: 6px;
            height: 6px;
            border-radius: var(--radius-full);
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s;
        }
        .modal-overlay.open {
            pointer-events: auto;
            opacity: 1;
        }
        .modal-sheet {
            background: var(--bg-surface);
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px 16px calc(20px + var(--safe-bottom));
            box-shadow: var(--shadow-lg);
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modal-overlay.open .modal-sheet {
            transform: translateY(0);
        }
        .modal-handle {
            width: 36px;
            height: 4px;
            background: var(--border-light);
            border-radius: 2px;
            margin: 0 auto 16px;
        }
        .modal-title {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 14px;
            letter-spacing: -0.3px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 16px;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            border: 1px solid var(--border);
            background: var(--bg-elevated);
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .btn.danger {
            background: var(--danger);
            border-color: var(--danger);
            color: #fff;
        }
        .btn.small {
            padding: 6px 10px;
            font-size: 11px;
            border-radius: var(--radius-sm);
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
            font-size: 13px;
        }
        .list-item:active {
            background: var(--bg-secondary);
            margin: 0 -16px;
            padding-left: 16px;
            padding-right: 16px;
            border-radius: var(--radius-sm);
        }
        input[type="text"],
        input[type="search"],
        select {
            width: 100%;
            padding: 10px 12px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }
        input:focus,
        select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* ===== TOAST ===== */
        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            z-index: 200;
            background: var(--bg-elevated);
            color: var(--text-primary);
            padding: 10px 18px;
            border-radius: var(--radius-xl);
            font-size: 13px;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            border: 1px solid var(--border);
        }
        #toast.show {
            transform: translateX(-50%) translateY(0);
        }
        #toast.success {
            border-color: var(--success);
        }
        #toast.error {
            border-color: var(--danger);
        }

        /* ===== LAYER SELECTOR MINI ===== */
        .layer-mini {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .layer-chip {
            padding: 5px 10px;
            border-radius: var(--radius-xl);
            font-size: 10px;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            transition: var(--transition);
            font-weight: 500;
        }
        .layer-chip.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* Leaflet overrides */
        .leaflet-control-zoom {
            display: none;
        }
        .leaflet-draw-toolbar {
            display: none;
        }
        .leaflet-control-attribution {
            font-size: 9px !important;
            opacity: 0.6;
        }

        @media (min-width: 768px) {
            #bottom-panel {
                left: auto;
                right: 80px;
                width: 320px;
                bottom: 16px;
            }
            #fab-group {
                right: 20px;
            }
            .modal-sheet {
                border-radius: var(--radius-xl);
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- MAP -->
    <div id="map-container"><div id="map"></div></div>

    <!-- TOP BAR -->
    <div id="top-bar">
        <div class="top-chip project-name" id="project-chip" title="Projeto atual">
            <span id="project-name-display">Projeto Padrão</span>
        </div>
        <div class="top-chip" id="gnss-chip">
            <div class="gnss-status-dot off" id="gnss-dot"></div>
            <span id="gnss-mode-text">--</span>
            <span id="sat-count">0 sat</span>
        </div>
    </div>

    <!-- FAB GROUP -->
    <div id="fab-group">
        <button class="fab capture-fab" id="fab-capture" title="Capturar Ponto" aria-label="Capturar">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="10" stroke-dasharray="4 3"/></svg>
            <span class="fab-label">Capturar</span>
        </button>
        <button class="fab" id="fab-center" title="Centralizar Posição" aria-label="Centralizar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="8"/><line x1="12" y1="16" x2="12" y2="22"/><line x1="2" y1="12" x2="8" y2="12"/><line x1="16" y1="12" x2="22" y2="12"/></svg>
            <span class="fab-label">Centralizar</span>
        </button>
        <button class="fab" id="fab-layers" title="Camadas" aria-label="Camadas">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
            <span class="fab-label">Camadas</span>
        </button>
        <button class="fab" id="fab-measure" title="Medir" aria-label="Medir">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 21 21 3"/><circle cx="6" cy="18" r="1.5"/><circle cx="18" cy="6" r="1.5"/></svg>
            <span class="fab-label">Medir</span>
        </button>
        <button class="fab" id="fab-settings" title="Configurações" aria-label="Configurações">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
            <span class="fab-label">Config</span>
        </button>
    </div>

    <!-- BOTTOM PANEL -->
    <div id="bottom-panel" class="collapsed">
        <div id="panel-header">
            <span>📋 Informações da Coleta</span>
            <span style="font-size:10px;color:var(--text-muted)">▼</span>
        </div>
        <div id="panel-content">
            <div class="coord-grid" id="coord-grid">
                <div class="coord-item"><div class="label">Latitude</div><div class="value" id="val-lat">--</div></div>
                <div class="coord-item"><div class="label">Longitude</div><div class="value" id="val-lng">--</div></div>
                <div class="coord-item"><div class="label">UTM E</div><div class="value" id="val-utm-e">--</div></div>
                <div class="coord-item"><div class="label">UTM N</div><div class="value" id="val-utm-n">--</div></div>
            </div>
            <div class="metric-row" id="metric-row">
                <div class="metric-badge"><span>Alt:</span><strong id="val-alt">--</strong></div>
                <div class="metric-badge"><span>Prec H:</span><strong id="val-prec-h">--</strong></div>
                <div class="metric-badge"><span>Prec V:</span><strong id="val-prec-v">--</strong></div>
                <div class="metric-badge"><span>Dist:</span><strong id="val-dist">--</strong></div>
                <div class="metric-badge"><span>Área:</span><strong id="val-area">--</strong></div>
                <div class="metric-badge"><span>Azim:</span><strong id="val-azim">--</strong></div>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast"></div>

    <!-- MODAL OVERLAY -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-sheet" id="modal-sheet"></div>
    </div>

    <!-- HIDDEN FILE INPUT -->
    <input type="file" id="file-input" accept=".geojson,.kml,.kmz,.gpx,.csv,.dxf,.shp,.zip,.gpkg" style="display:none" multiple>

    <!-- ==================== SCRIPTS ==================== -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>
    <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js">
    </script>
    <script src="https://unpkg.com/proj4@2.9.0/dist/proj4.js">
    </script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js">
    </script>
    <script src="https://unpkg.com/@tmcw/togeojson@5.8.1/dist/togeojson.umd.js">
    </script>
    <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js">
    </script>

    <script>
        (function() {
            // ==================== GLOBAL STATE ====================
            const APP_STATE = {
                currentProject: null,
                projects: [],
                collectedFeatures: [], // GeoJSON FeatureCollection
                gnssPosition: null,
                gnssStatus: 'off', // 'off' | 'gps' | 'dgps' | 'float' | 'fix'
                satelliteCount: 0,
                horizontalPrecision: null,
                verticalPrecision: null,
                altitude: null,
                activeCollectionMode: 'point', // 'point' | 'line' | 'polygon'
                activeLinePoints: [],
                activePolygonPoints: [],
                isMeasuring: false,
                measurePoints: [],
                currentBaseLayer: 'satellite',
                mapZoom: 18,
                settings: {
                    coordinateFormat: 'dd', // 'dd' | 'dms' | 'utm'
                    accuracyThreshold: 5.0,
                    autoCenter: true,
                    darkMode: true,
                },
            };

            // ==================== INDEXEDDB STORAGE ====================
            const DB_NAME = 'geosense_gnss_db';
            const DB_VERSION = 1;
            let db = null;

            function openDB() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onupgradeneeded = (e) => {
                        const database = e.target.result;
                        if (!database.objectStoreNames.contains('projects')) {
                            database.createObjectStore('projects', { keyPath: 'id' });
                        }
                        if (!database.objectStoreNames.contains('features')) {
                            database.createObjectStore('features', { keyPath: 'id' });
                        }
                        if (!database.objectStoreNames.contains('settings')) {
                            database.createObjectStore('settings', { keyPath: 'key' });
                        }
                    };
                    request.onsuccess = (e) => {
                        db = e.target.result;
                        resolve(db);
                    };
                    request.onerror = () => reject(request.error);
                });
            }

            async function dbPut(storeName, data) {
                if (!db) await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    store.put(data);
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            }

            async function dbGetAll(storeName) {
                if (!db) await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(storeName, 'readonly');
                    const store = tx.objectStore(storeName);
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async function dbDelete(storeName, id) {
                if (!db) await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    store.delete(id);
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            }

            async function dbClear(storeName) {
                if (!db) await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    store.clear();
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            }

            // ==================== TOAST ====================
            let toastTimer;
            const toastEl = document.getElementById('toast');

            function showToast(message, type = '') {
                clearTimeout(toastTimer);
                toastEl.textContent = message;
                toastEl.className = 'show ' + type;
                toastTimer = setTimeout(() => {
                    toastEl.className = '';
                }, 2200);
            }

            // ==================== MAP MODULE ====================
            const mapEl = document.getElementById('map');
            const map = L.map(mapEl, {
                center: [-15.7801, -47.9292],
                zoom: 5,
                zoomControl: false,
                attributionControl: true,
                maxZoom: 22,
                minZoom: 2,
            });

            // Base layers
            const baseLayers = {
                satellite: L.tileLayer(
                    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                        attribution: 'Esri',
                        maxZoom: 20,

                ),
                hybrid: L.tileLayer(

                        attribution: 'Esri',

                    }
                ),
                streets: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {

                }),
                topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
                    attribution: 'OpenTopoMap',
