            // Hybrid overlay (labels)
            const hybridLabels = L.tileLayer(
                'https://services.arcgisonline.com/arcgis/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
                    attribution: 'Esri',
                    maxZoom: 20,
                    opacity: 0.8,
                }
            );

            let currentBaseLayerKey = 'satellite';
            baseLayers[currentBaseLayerKey].addTo(map);
            hybridLabels.addTo(map);

            function setBaseLayer(key) {
                if (baseLayers[currentBaseLayerKey]) {
                    map.removeLayer(baseLayers[currentBaseLayerKey]);
                }
                if (key === 'hybrid') {
                    baseLayers['satellite'].addTo(map);
                    hybridLabels.addTo(map);
                    currentBaseLayerKey = 'satellite';
                } else {
                    if (key !== 'satellite') hybridLabels.remove();
                    else hybridLabels.addTo(map);
                    baseLayers[key].addTo(map);
                    currentBaseLayerKey = key;
                }
                APP_STATE.currentBaseLayer = key === 'hybrid' ? 'hybrid' : key;
            }

            // Feature groups
            const collectedLayer = L.featureGroup().addTo(map);
            const measureLayer = L.featureGroup().addTo(map);
            const activeDrawLayer = L.featureGroup().addTo(map);

            // Position marker
            const positionMarker = L.circleMarker([0, 0], {
                radius: 10,
                fillColor: '#4da6ff',
                fillOpacity: 0.7,
                color: '#fff',
                weight: 3,
                opacity: 1,
            }).addTo(map);
            positionMarker.setLatLng([-15.7801, -47.9292]);

            const accuracyCircle = L.circle([0, 0], {
                radius: 50,
                fillColor: '#4da6ff',
                fillOpacity: 0.15,
                color: '#4da6ff',
                weight: 1,
                opacity: 0.5,
                dashArray: '5,5',
            }).addTo(map);

            // Draw control for lines and polygons
            const drawControl = new L.Control.Draw({
                position: 'topright',
                draw: {
                    polygon: false,
                    polyline: false,
                    rectangle: false,
                    circle: false,
                    circlemarker: false,
                    marker: false,
                },
                edit: { featureGroup: collectedLayer },
            });
            // We handle drawing manually, so don't add drawControl to map

            // ==================== GNSS MODULE ====================
            let gnssWatchId = null;
            let simulatedGnssInterval = null;

            function simulateGNSS() {
                // Simulate GNSS data with realistic variations
                const baseLat = -15.7801 + (Math.random() - 0.5) * 0.0002;
                const baseLng = -47.9292 + (Math.random() - 0.5) * 0.0002;
                const precision = 1.5 + Math.random() * 4;
                const satCount = Math.floor(8 + Math.random() * 16);
                let status = 'gps';
                if (precision < 2) status = 'fix';
                else if (precision < 3.5) status = 'float';
                else if (precision < 5) status = 'dgps';

                return {
                    latitude: baseLat,
                    longitude: baseLng,
                    altitude: 1050 + Math.random() * 30,
                    accuracy: precision,
                    altitudeAccuracy: precision * 1.8,
                    satelliteCount: satCount,
                    status: status,
                    timestamp: Date.now(),
                };
            }

            function startGNSS() {
                if (navigator.geolocation) {
                    gnssWatchId = navigator.geolocation.watchPosition(
                        (pos) => {
                            updateGNSSData({
                                latitude: pos.coords.latitude,
                                longitude: pos.coords.longitude,
                                altitude: pos.coords.altitude || 0,
                                accuracy: pos.coords.accuracy,
                                altitudeAccuracy: pos.coords.altitudeAccuracy || pos.coords
                                    .accuracy * 2,
                                satelliteCount: estimateSatellites(pos.coords.accuracy),
                                status: classifyAccuracy(pos.coords.accuracy),
                                timestamp: pos.timestamp,
                            });
                        },
                        (err) => {
                            console.warn('Geolocation error, using simulation:', err.message);
                            startSimulatedGNSS();
                        }, {
                            enableHighAccuracy: true,
                            maximumAge: 1000,
                            timeout: 15000,
                        }
                    );
                } else {
                    startSimulatedGNSS();
                }
                // Fallback simulation after 3 seconds if no real data
                setTimeout(() => {
                    if (!APP_STATE.gnssPosition || (Date.now() - (APP_STATE.gnssPosition
                            .timestamp || 0) > 5000)) {
                        if (!simulatedGnssInterval) startSimulatedGNSS();
                    }
                }, 3000);
            }

            function startSimulatedGNSS() {
                if (simulatedGnssInterval) return;
                updateGNSSData(simulateGNSS());
                simulatedGnssInterval = setInterval(() => {
                    updateGNSSData(simulateGNSS());
                }, 1500);
            }

            function estimateSatellites(accuracy) {
                if (accuracy < 2) return 18 + Math.floor(Math.random() * 6);
                if (accuracy < 5) return 12 + Math.floor(Math.random() * 8);
                if (accuracy < 10) return 8 + Math.floor(Math.random() * 8);
                return 4 + Math.floor(Math.random() * 8);
            }

            function classifyAccuracy(accuracy) {
                if (accuracy < 1.5) return 'fix';
                if (accuracy < 3) return 'float';
                if (accuracy < 6) return 'dgps';
                return 'gps';
            }

            function updateGNSSData(data) {
                APP_STATE.gnssPosition = data;
                APP_STATE.gnssStatus = data.status;
                APP_STATE.satelliteCount = data.satelliteCount;
                APP_STATE.horizontalPrecision = data.accuracy;
                APP_STATE.verticalPrecision = data.altitudeAccuracy;
                APP_STATE.altitude = data.altitude;

                // Update marker
                positionMarker.setLatLng([data.latitude, data.longitude]);
                accuracyCircle.setLatLng([data.latitude, data.longitude]);
                accuracyCircle.setRadius(data.accuracy);

                // Auto-center
                if (APP_STATE.settings.autoCenter) {
                    map.setView([data.latitude, data.longitude], Math.max(map.getZoom(), 17), { animate: true });
                }

                updateUI();
            }

            function stopGNSS() {
                if (gnssWatchId) {
                    navigator.geolocation.clearWatch(gnssWatchId);
                    gnssWatchId = null;
                }
                if (simulatedGnssInterval) {
                    clearInterval(simulatedGnssInterval);
                    simulatedGnssInterval = null;
                }
            }

            // ==================== UTM CONVERSION ====================
            function getUTMZone(lng) {
                return Math.floor((lng + 180) / 6) + 1;
            }

            function getUTMProjString(lng, lat) {
                const zone = getUTMZone(lng);
                const hemisphere = lat >= 0 ? 'north' : 'south';
                return `+proj=utm +zone=${zone} +${hemisphere} +datum=WGS84 +units=m +no_defs`;
            }

            function toUTM(lng, lat) {
                try {
                    const projStr = getUTMProjString(lng, lat);
                    const result = proj4('EPSG:4326', projStr, [lng, lat]);
                    return { easting: result[0], northing: result[1], zone: getUTMZone(lng), hemisphere: lat >= 0 ?
                            'N' : 'S' };
                } catch (e) {
                    return { easting: 0, northing: 0, zone: 0, hemisphere: 'N' };
                }
            }

            function formatDMS(deg, isLat) {
                const dir = isLat ? (deg >= 0 ? 'N' : 'S') : (deg >= 0 ? 'E' : 'W');
                const abs = Math.abs(deg);
                const d = Math.floor(abs);
                const m = Math.floor((abs - d) * 60);
                const s = ((abs - d - m / 60) * 3600).toFixed(2);
                return `${d}°${m}'${s}"${dir}`;
            }

            // ==================== COLLECTION MODULE ====================
            function capturePoint() {
                if (!APP_STATE.gnssPosition) {
                    showToast('Sem sinal GNSS disponível', 'error');
                    return;
                }
                const pos = APP_STATE.gnssPosition;
                const feature = {
                    type: 'Feature',
                    id: generateUUID(),
                    geometry: {
                        type: 'Point',
                        coordinates: [pos.longitude, pos.latitude, pos.altitude],
                    },
                    properties: {
                        name: `Ponto ${APP_STATE.collectedFeatures.length + 1}`,
                        timestamp: new Date().toISOString(),
                        altitude: pos.altitude,
                        accuracy: pos.accuracy,
                        altitudeAccuracy: pos.altitudeAccuracy,
                        satelliteCount: pos.satelliteCount,
                        gnssStatus: pos.status,
                        collectionMode: 'point',
                        projectId: APP_STATE.currentProject ? APP_STATE.currentProject.id : null,
                    },
                };
                addFeature(feature);
                renderFeatureOnMap(feature);
                showToast('✅ Ponto capturado!', 'success');
                saveFeatures();
                updateCalculations();
            }

            function startLineMode() {
                APP_STATE.activeCollectionMode = 'line';
                APP_STATE.activeLinePoints = [];
                activeDrawLayer.clearLayers();
                document.getElementById('fab-capture').classList.add('active');
                showToast('📏 Modo Linha - Capture pontos sequenciais', 'success');
                updateCaptureButtonIcon();
            }

            function startPolygonMode() {
                APP_STATE.activeCollectionMode = 'polygon';
                APP_STATE.activePolygonPoints = [];
                activeDrawLayer.clearLayers();
                document.getElementById('fab-capture').classList.add('active');
                showToast('📐 Modo Polígono - Capture vértices', 'success');
                updateCaptureButtonIcon();
            }

            function captureLinePoint() {
                if (!APP_STATE.gnssPosition) {
                    showToast('Sem sinal GNSS', 'error');
                    return;
                }
                const pos = APP_STATE.gnssPosition;
                APP_STATE.activeLinePoints.push([pos.longitude, pos.latitude, pos.altitude]);
                updateActiveDrawLayer();
                if (APP_STATE.activeLinePoints.length >= 2) {
                    updateCalculations();
                }
                showToast(`Vértice ${APP_STATE.activeLinePoints.length} adicionado`, 'success');
            }

            function capturePolygonPoint() {
                if (!APP_STATE.gnssPosition) {
                    showToast('Sem sinal GNSS', 'error');
                    return;
                }
                const pos = APP_STATE.gnssPosition;
                APP_STATE.activePolygonPoints.push([pos.longitude, pos.latitude, pos.altitude]);
                updateActiveDrawLayer();
                if (APP_STATE.activePolygonPoints.length >= 3) {
                    updateCalculations();
                }
                showToast(`Vértice ${APP_STATE.activePolygonPoints.length} adicionado`, 'success');
            }

            function finishLine() {
                if (APP_STATE.activeLinePoints.length < 2) {
                    showToast('São necessários pelo menos 2 pontos para uma linha', 'error');
                    return;
                }
                const feature = {
                    type: 'Feature',
                    id: generateUUID(),
                    geometry: {
                        type: 'LineString',
                        coordinates: [...APP_STATE.activeLinePoints],
                    },
                    properties: {
                        name: `Linha ${APP_STATE.collectedFeatures.length + 1}`,
                        timestamp: new Date().toISOString(),
                        collectionMode: 'line',
                        vertexCount: APP_STATE.activeLinePoints.length,
                        projectId: APP_STATE.currentProject ? APP_STATE.currentProject.id : null,
                    },
                };
                addFeature(feature);
                renderFeatureOnMap(feature);
                APP_STATE.activeLinePoints = [];
                activeDrawLayer.clearLayers();
                showToast('✅ Linha finalizada!', 'success');
                saveFeatures();
                updateCalculations();
            }

            function finishPolygon() {
                if (APP_STATE.activePolygonPoints.length < 3) {
                    showToast('São necessários pelo menos 3 pontos para um polígono', 'error');
                    return;
                }
                // Close the polygon
                const coords = [...APP_STATE.activePolygonPoints];
                if (coords[0][0] !== coords[coords.length - 1][0] || coords[0][1] !== coords[coords.length - 1][1]) {
                    coords.push([...coords[0]]);
                }
                const feature = {
                    type: 'Feature',
                    id: generateUUID(),
                    geometry: {
                        type: 'Polygon',
                        coordinates: [coords],
                    },
                    properties: {
                        name: `Polígono ${APP_STATE.collectedFeatures.length + 1}`,
                        timestamp: new Date().toISOString(),
                        collectionMode: 'polygon',
                        vertexCount: APP_STATE.activePolygonPoints.length,
                        projectId: APP_STATE.currentProject ? APP_STATE.currentProject.id : null,
                    },
                };
                addFeature(feature);
                renderFeatureOnMap(feature);
                APP_STATE.activePolygonPoints = [];
                activeDrawLayer.clearLayers();
                showToast('✅ Polígono finalizado!', 'success');
                saveFeatures();
                updateCalculations();
            }

            function updateActiveDrawLayer() {
                activeDrawLayer.clearLayers();
                if (APP_STATE.activeCollectionMode === 'line' && APP_STATE.activeLinePoints.length > 0) {
                    const latlngs = APP_STATE.activeLinePoints.map(c => [c[1], c[0]]);
                    L.polyline(latlngs, {
                        color: '#fbbf24',
                        weight: 3,
                        dashArray: '8,4',
                    }).addTo(activeDrawLayer);
                    APP_STATE.activeLinePoints.forEach((c, i) => {
                        L.circleMarker([c[1], c[0]], {
                            radius: 6,
                            fillColor: '#fbbf24',
                            fillOpacity: 0.8,
                            color: '#fff',
                            weight: 2,
                        }).bindTooltip(`${i + 1}`, { permanent: false }).addTo(
                        activeDrawLayer);
                    });
                }
                if (APP_STATE.activeCollectionMode === 'polygon' && APP_STATE.activePolygonPoints.length > 0) {
                    const latlngs = APP_STATE.activePolygonPoints.map(c => [c[1], c[0]]);
                    if (latlngs.length >= 2) {
                        L.polygon(latlngs, {
                            color: '#34d399',
                            weight: 3,
                            fillOpacity: 0.2,
                            fillColor: '#34d399',
                            dashArray: '8,4',
                        }).addTo(activeDrawLayer);
                    }
                    APP_STATE.activePolygonPoints.forEach((c, i) => {
                        L.circleMarker([c[1], c[0]], {
                            radius: 6,
                            fillColor: '#34d399',
                            fillOpacity: 0.8,
                            color: '#fff',
                            weight: 2,
                        }).bindTooltip(`${i + 1}`, { permanent: false }).addTo(
                        activeDrawLayer);
                    });
                }
            }

            function updateCaptureButtonIcon() {
                const btn = document.getElementById('fab-capture');
                if (APP_STATE.activeCollectionMode === 'line') {
                    btn.innerHTML =
                        '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="4 20 20 4"/><circle cx="6" cy="18" r="1.5"/><circle cx="18" cy="6" r="1.5"/></svg><span class="fab-label">+ Vértice</span>';
                } else if (APP_STATE.activeCollectionMode === 'polygon') {
                    btn.innerHTML =
                        '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="12 2 22 8 18 20 6 20 2 8"/></svg><span class="fab-label">+ Vértice</span>';
                } else {
                    btn.innerHTML =
                        '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="10" stroke-dasharray="4 3"/></svg><span class="fab-label">Capturar</span>';
                }
            }

            function addFeature(feature) {
                APP_STATE.collectedFeatures.push(feature);
            }

            function renderFeatureOnMap(feature) {
                const geoJSON = { type: 'FeatureCollection', features: [feature] };
                const layer = L.geoJSON(geoJSON, {
                    pointToLayer: (f, latlng) => L.circleMarker(latlng, {
                        radius: 8,
                        fillColor: '#4da6ff',
                        fillOpacity: 0.8,
                        color: '#fff',
                        weight: 2,
                    }),
                    style: (f) => {
                        if (f.geometry.type === 'LineString') return { color: '#fbbf24', weight: 3 };
                        if (f.geometry.type === 'Polygon') return { color: '#34d399', weight: 2,
                            fillOpacity: 0.25, fillColor: '#34d399' };
                        return {};
                    },
                }).bindPopup(createPopupContent(feature));
                layer._featureId = feature.id;
                collectedLayer.addLayer(layer);
            }

            function createPopupContent(feature) {
                const p = feature.properties;
                const geom = feature.geometry;
                let html = `<strong>${p.name || 'Feição'}</strong><br>`;
                html += `<small>Tipo: ${geom.type}</small><br>`;
                html += `<small>Data: ${new Date(p.timestamp).toLocaleString()}</small><br>`;
                if (p.accuracy) html += `<small>Precisão: ${p.accuracy.toFixed(2)}m</small><br>`;
                if (p.vertexCount) html += `<small>Vértices: ${p.vertexCount}</small><br>`;
                html +=
                    `<button onclick="window._deleteFeature('${feature.id}')" style="margin-top:4px;padding:4px 8px;background:#f87171;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11px;">🗑 Excluir</button>`;
                return html;
            }

            window._deleteFeature = function(featureId) {
                APP_STATE.collectedFeatures = APP_STATE.collectedFeatures.filter(f => f.id !== featureId);
                refreshCollectedLayer();
                saveFeatures();
                updateCalculations();
                showToast('Feição removida', 'error');
            };

            function refreshCollectedLayer() {
                collectedLayer.clearLayers();
                APP_STATE.collectedFeatures.forEach(f => renderFeatureOnMap(f));
            }

            function updateCalculations() {
                const distEl = document.getElementById('val-dist');
                const areaEl = document.getElementById('val-area');
                const azimEl = document.getElementById('val-azim');

                distEl.textContent = '--';
                areaEl.textContent = '--';
                azimEl.textContent = '--';

                // Check active drawing
                if (APP_STATE.activeCollectionMode === 'line' && APP_STATE.activeLinePoints.length >= 2) {
                    try {
                        const line = turf.lineString(APP_STATE.activeLinePoints);
                        const length = turf.length(line, { units: 'meters' });
                        distEl.textContent = length < 1000 ? `${length.toFixed(2)} m` : `${(length/1000).toFixed(3)} km`;
                        if (APP_STATE.activeLinePoints.length >= 2) {
                            const lastTwo = APP_STATE.activeLinePoints.slice(-2);
                            const bearing = turf.bearing(turf.point(lastTwo[0]), turf.point(lastTwo[1]));
                            azimEl.textContent = `${((bearing + 360) % 360).toFixed(1)}°`;
                        }
                    } catch (e) {}
                }
                if (APP_STATE.activeCollectionMode === 'polygon' && APP_STATE.activePolygonPoints.length >= 3) {
                    try {
                        const coords = [...APP_STATE.activePolygonPoints, APP_STATE.activePolygonPoints[0]];
                        const polygon = turf.polygon([coords]);
                        const area = turf.area(polygon);
                        distEl.textContent = `${(turf.length(turf.polygonToLine(polygon), {units:'meters'})).toFixed(2)} m (perím.)`;
                        areaEl.textContent = area < 10000 ? `${area.toFixed(2)} m²` :
                            `${(area/10000).toFixed(4)} ha`;
                    } catch (e) {}
                }

                // Check last collected features
                if (APP_STATE.collectedFeatures.length > 0) {
                    const last = APP_STATE.collectedFeatures[APP_STATE.collectedFeatures.length - 1];
                    if (last.geometry.type === 'LineString') {
                        try {
                            const line = turf.lineString(last.geometry.coordinates);
                            distEl.textContent = (turf.length(line, { units: 'meters' })).toFixed(2) + ' m';
                        } catch (e) {}
                    }
                    if (last.geometry.type === 'Polygon') {
                        try {
                            const poly = turf.polygon(last.geometry.coordinates);
                            const area = turf.area(poly);
                            distEl.textContent = (turf.length(turf.polygonToLine(poly), { units: 'meters' }))
                                .toFixed(2) + ' m (perím.)';
                            areaEl.textContent = area < 10000 ? `${area.toFixed(2)} m²` :
                                `${(area/10000).toFixed(4)} ha`;
                        } catch (e) {}
                    }
                }
            }

            // ==================== MEASURE MODULE ====================
            function toggleMeasureMode() {
                APP_STATE.isMeasuring = !APP_STATE.isMeasuring;
                APP_STATE.measurePoints = [];
                measureLayer.clearLayers();
                const btn = document.getElementById('fab-measure');
                if (APP_STATE.isMeasuring) {
                    btn.classList.add('active');
                    map.getContainer().style.cursor = 'crosshair';
                    showToast('📏 Modo medição - Clique no mapa', 'success');
                } else {
                    btn.classList.remove('active');
                    map.getContainer().style.cursor = '';
                    showToast('Medição finalizada', 'success');
                }
            }

            map.on('click', function(e) {
                if (!APP_STATE.isMeasuring) return;
                APP_STATE.measurePoints.push([e.latlng.lng, e.latlng.lat]);
                measureLayer.clearLayers();
                const latlngs = APP_STATE.measurePoints.map(c => [c[1], c[0]]);
                if (latlngs.length >= 2) {
                    L.polyline(latlngs, {
                        color: '#fbbf24',
                        weight: 3,
                        dashArray: '6,3',
                    }).addTo(measureLayer);
                    try {
                        const line = turf.lineString(APP_STATE.measurePoints);
                        const dist = turf.length(line, { units: 'meters' });
                        const lastTwo = APP_STATE.measurePoints.slice(-2);
                        const bearing = turf.bearing(turf.point(lastTwo[0]), turf.point(lastTwo[1]));
                        L.popup({ closeOnClick: false })
                            .setLatLng(e.latlng)
                            .setContent(
                                `<small>Segmento: ${dist.toFixed(2)}m<br>Azimute: ${((bearing+360)%360).toFixed(1)}°</small>`
                                )
                            .addTo(measureLayer);
                    } catch (ex) {}
                }
                latlngs.forEach((ll, i) => {
                    L.circleMarker(ll, {
                        radius: 5,
                        fillColor: '#fbbf24',
                        fillOpacity: 0.9,
                        color: '#fff',
                        weight: 2,
                    }).bindTooltip(`${i+1}`, { permanent: false }).addTo(measureLayer);
                });
                if (APP_STATE.measurePoints.length >= 3) {
                    try {
                        const coords = [...APP_STATE.measurePoints, APP_STATE.measurePoints[0]];
                        const poly = turf.polygon([coords]);
                        const area = turf.area(poly);
                        const center = turf.center(poly);
                        L.popup({ closeOnClick: false })
                            .setLatLng([center.geometry.coordinates[1], center.geometry.coordinates[0]])
                            .setContent(
                                `<small>Área: ${area<10000?area.toFixed(2)+' m²':(area/10000).toFixed(4)+' ha'}</small>`
                                )
                            .addTo(measureLayer);
                    } catch (ex) {}
                }
            });

            // ==================== PROJECT MANAGEMENT ====================
            function createProject(name) {
                const project = {
                    id: generateUUID(),
                    name: name || 'Novo Projeto',
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString(),
                    featureCount: 0,
                };
                APP_STATE.projects.push(project);
                APP_STATE.currentProject = project;
                saveProjects();
                updateUI();
                return project;
            }

            function setCurrentProject(projectId) {
                const project = APP_STATE.projects.find(p => p.id === projectId);
                if (project) {
                    APP_STATE.currentProject = project;
                    APP_STATE.collectedFeatures = [];
                    refreshCollectedLayer();
                    loadFeaturesForProject(projectId);
                    updateUI();
                }
            }

            async function loadFeaturesForProject(projectId) {
                try {
                    const allFeatures = await dbGetAll('features');
                    APP_STATE.collectedFeatures = allFeatures.filter(f => f.properties.projectId === projectId);
                    refreshCollectedLayer();
                    updateCalculations();
                } catch (e) {
                    console.warn('Could not load features:', e);
                }
            }

            async function saveFeatures() {
                try {
                    await dbClear('features');
                    for (const f of APP_STATE.collectedFeatures) {
                        await dbPut('features', f);
                    }
                    if (APP_STATE.currentProject) {
                        APP_STATE.currentProject.featureCount = APP_STATE.collectedFeatures.length;
                        APP_STATE.currentProject.updatedAt = new Date().toISOString();
                        saveProjects();
                    }
                } catch (e) {
                    console.warn('Save features error:', e);
                }
            }

            async function saveProjects() {
                try {
                    await dbClear('projects');
                    for (const p of APP_STATE.projects) {
                        await dbPut('projects', p);
                    }
                } catch (e) {
                    console.warn('Save projects error:', e);
                }
            }

            async function loadAllData() {
                try {
                    const projs = await dbGetAll('projects');
                    if (projs.length > 0) {
                        APP_STATE.projects = projs;
                        APP_STATE.currentProject = projs[0];
                    } else {
                        createProject('Projeto Padrão');
                    }
                    const feats = await dbGetAll('features');
                    APP_STATE.collectedFeatures = feats.filter(
                        f => f.properties.projectId === (APP_STATE.currentProject ? APP_STATE.currentProject.id :
                            null)
                    );
                    refreshCollectedLayer();
                    updateCalculations();
                } catch (e) {
                    console.warn('Load data error:', e);
                    createProject('Projeto Padrão');
                }
                updateUI();
            }

            // ==================== EXPORT / IMPORT ====================
            function exportGeoJSON() {
                const fc = {
                    type: 'FeatureCollection',
                    features: APP_STATE.collectedFeatures,
                };
                downloadFile(JSON.stringify(fc, null, 2), 'coleta.geojson', 'application/geo+json');
                showToast('📥 GeoJSON exportado!', 'success');
            }

            function exportKML() {
                let kml = '<?xml version="1.0" encoding="UTF-8"?>\n';
                kml += '<kml xmlns="http://www.opengis.net/kml/2.2">\n<Document>\n';
                kml += `<name>${APP_STATE.currentProject?.name||'Coleta'}</name>\n`;
                APP_STATE.collectedFeatures.forEach((f, i) => {
                    kml += '<Placemark>\n';
                    kml += `<name>${f.properties.name||'Feicao '+i}</name>\n`;
                    if (f.geometry.type === 'Point') {
                        kml +=
                            `<Point><coordinates>${f.geometry.coordinates[0]},${f.geometry.coordinates[1]},${f.geometry.coordinates[2]||0}</coordinates></Point>\n`;
                    } else if (f.geometry.type === 'LineString') {
                        kml +=
                            `<LineString><coordinates>${f.geometry.coordinates.map(c=>c.join(',')).join(' ')}</coordinates></LineString>\n`;
                    } else if (f.geometry.type === 'Polygon') {
                        kml +=
                            `<Polygon><outerBoundaryIs><LinearRing><coordinates>${f.geometry.coordinates[0].map(c=>c.join(',')).join(' ')}</coordinates></LinearRing></outerBoundaryIs></Polygon>\n`;
                    }
                    kml += '</Placemark>\n';
                });
                kml += '</Document>\n</kml>';
                downloadFile(kml, 'coleta.kml', 'application/vnd.google-earth.kml+xml');
                showToast('📥 KML exportado!', 'success');
            }

            function exportGPX() {
                let gpx = '<?xml version="1.0" encoding="UTF-8"?>\n';
                gpx += '<gpx version="1.1" xmlns="http://www.topografix.com/GPX/1/1">\n';
                APP_STATE.collectedFeatures.forEach(f => {
                    if (f.geometry.type === 'Point') {
                        gpx +=
                            `<wpt lat="${f.geometry.coordinates[1]}" lon="${f.geometry.coordinates[0]}"><name>${f.properties.name||'Ponto'}</name><ele>${f.geometry.coordinates[2]||0}</ele></wpt>\n`;
                    }
                });
                gpx += '</gpx>';
                downloadFile(gpx, 'coleta.gpx', 'application/gpx+xml');
                showToast('📥 GPX exportado!', 'success');
            }

            function exportCSV() {
                let csv = 'nome,latitude,longitude,altitude,precisao,tipo,data\n';
                APP_STATE.collectedFeatures.forEach(f => {
                    const coords = f.geometry.type === 'Point' ? f.geometry.coordinates : (f.geometry.coordinates[
                        0] ? f.geometry.coordinates[0][0] : [0, 0, 0]);
                    csv +=
                        `${f.properties.name||''},${coords[1]},${coords[0]},${coords[2]||''},${f.properties.accuracy||''},${f.geometry.type},${f.properties.timestamp||''}\n`;
                });
                downloadFile(csv, 'coleta.csv', 'text/csv');
                showToast('📥 CSV exportado!', 'success');
            }

            function downloadFile(content, filename, mimeType) {
                const blob = new Blob([content], { type: mimeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            function triggerImport() {
                document.getElementById('file-input').click();
            }

            async function handleFileImport(event) {
                const files = event.target.files;
                if (!files.length) return;
                for (const file of files) {
                    try {
                        const text = await file.text();
                        const ext = file.name.split('.').pop().toLowerCase();
                        let geojson = null;
                        if (ext === 'geojson' || ext === 'json') {
                            geojson = JSON.parse(text);
                        } else if (ext === 'kml') {
                            const parser = new DOMParser();
                            const kmlDoc = parser.parseFromString(text, 'text/xml');
                            geojson = toGeoJSON.kml(kmlDoc);
                        } else if (ext === 'gpx') {
                            const parser = new DOMParser();
                            const gpxDoc = parser.parseFromString(text, 'text/xml');
                            geojson = toGeoJSON.gpx(gpxDoc);
                        } else if (ext === 'csv') {
                            geojson = csvToGeoJSON(text);
                        } else if (ext === 'kmz') {
                            const zip = await JSZip.loadAsync(file);
                            const kmlFile = Object.keys(zip.files).find(f => f.endsWith('.kml'));
                            if (kmlFile) {
                                const kmlText = await zip.files[kmlFile].async('string');
                                const parser = new DOMParser();
                                const kmlDoc = parser.parseFromString(kmlText, 'text/xml');
                                geojson = toGeoJSON.kml(kmlDoc);
                            }
                        }
                        if (geojson && geojson.features) {
                            let imported = 0;
                            geojson.features.forEach(f => {
                                f.id = generateUUID();
                                f.properties = f.properties || {};
                                f.properties.projectId = APP_STATE.currentProject ? APP_STATE
                                    .currentProject.id : null;
                                f.properties.timestamp = f.properties.timestamp || new Date()
                                    .toISOString();
                                f.properties.name = f.properties.name || 'Importado';
                                APP_STATE.collectedFeatures.push(f);
                                imported++;
                            });
                            refreshCollectedLayer();
                            saveFeatures();
                            updateCalculations();
                            showToast(`📥 ${imported} feições importadas de ${file.name}`, 'success');
                        }
                    } catch (e) {
                        console.error('Import error:', e);
                        showToast(`Erro ao importar ${file.name}: ${e.message}`, 'error');
                    }
                }
                event.target.value = '';
            }

            function csvToGeoJSON(csvText) {
                const lines = csvText.trim().split('\n');
                if (lines.length < 2) return { type: 'FeatureCollection', features: [] };
                const headers = lines[0].split(',');
                const latIdx = headers.findIndex(h => h.toLowerCase().includes('lat'));
                const lngIdx = headers.findIndex(h => h.toLowerCase().includes('lon') || h.toLowerCase().includes(
                    'lng'));
                const nameIdx = headers.findIndex(h => h.toLowerCase().includes('nome') || h.toLowerCase().includes(
                    'name'));
                const features = [];
                for (let i = 1; i < lines.length; i++) {
                    const vals = lines[i].split(',');
                    const lat = parseFloat(vals[latIdx]);
                    const lng = parseFloat(vals[lngIdx]);
                    if (!isNaN(lat) && !isNaN(lng)) {
                        features.push({
                            type: 'Feature',
                            geometry: { type: 'Point', coordinates: [lng, lat] },
                            properties: { name: nameIdx >= 0 ? vals[nameIdx] : `Ponto ${i}` },
                        });
                    }
                }
                return { type: 'FeatureCollection', features };
            }

            // ==================== UI UPDATE ====================
            function updateUI() {
                const pos = APP_STATE.gnssPosition;
                document.getElementById('val-lat').textContent = pos ? pos.latitude.toFixed(8) : '--';
                document.getElementById('val-lng').textContent = pos ? pos.longitude.toFixed(8) : '--';
                if (pos) {
                    const utm = toUTM(pos.longitude, pos.latitude);
                    document.getElementById('val-utm-e').textContent = utm.easting.toFixed(2);
                    document.getElementById('val-utm-n').textContent = utm.northing.toFixed(2);
                } else {
                    document.getElementById('val-utm-e').textContent = '--';
                    document.getElementById('val-utm-n').textContent = '--';
                }
                document.getElementById('val-alt').textContent = pos ? `${pos.altitude.toFixed(2)} m` : '--';
                document.getElementById('val-prec-h').textContent = pos ? `${pos.accuracy.toFixed(2)} m` : '--';
                document.getElementById('val-prec-v').textContent = pos ? `${pos.altitudeAccuracy.toFixed(2)} m` : '--';

                // GNSS status
                const dot = document.getElementById('gnss-dot');
                dot.className = 'gnss-status-dot ' + APP_STATE.gnssStatus;
                const modeText = document.getElementById('gnss-mode-text');
                const statusLabels = { off: 'Sem sinal', gps: 'GPS', dgps: 'DGPS', float: 'RTK Float', fix: 'RTK Fix' };
                modeText.textContent = statusLabels[APP_STATE.gnssStatus] || '--';
                document.getElementById('sat-count').textContent = `${APP_STATE.satelliteCount} sat`;

                // Project name
                document.getElementById('project-name-display').textContent =
                    APP_STATE.currentProject ? APP_STATE.currentProject.name : 'Projeto Padrão';

                updateCaptureButtonIcon();
            }

            // ==================== MODAL MANAGEMENT ====================
            const modalOverlay = document.getElementById('modal-overlay');
            const modalSheet = document.getElementById('modal-sheet');

            function openModal(contentHTML) {
                modalSheet.innerHTML =
                    '<div class="modal-handle"></div>' + contentHTML;
                modalOverlay.classList.add('open');
                document.body.style.overflow = 'hidden';
            }

            function closeModal() {
                modalOverlay.classList.remove('open');
                document.body.style.overflow = '';
            }

            modalOverlay.addEventListener('click', function(e) {
                if (e.target === modalOverlay) closeModal();
            });

            // Touch swipe down to close
            let touchStartY = 0;
            modalSheet.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; });
            modalSheet.addEventListener('touchmove', (e) => {
                const dy = e.touches[0].clientY - touchStartY;
                if (dy > 60 && modalSheet.scrollTop <= 0) {
                    closeModal();
                }
            });

            function openLayersModal() {
                const html = `
                <div class="modal-title">🗺 Camadas do Mapa</div>
                <div class="layer-mini" style="margin-bottom:12px;">
                    <span class="layer-chip ${APP_STATE.currentBaseLayer==='satellite'?'active':''}" data-layer="satellite">🛰 Satélite</span>
                    <span class="layer-chip ${APP_STATE.currentBaseLayer==='hybrid'?'active':''}" data-layer="hybrid">🔀 Híbrido</span>
                    <span class="layer-chip ${APP_STATE.currentBaseLayer==='streets'?'active':''}" data-layer="streets">🛣 Ruas</span>
                    <span class="layer-chip ${APP_STATE.currentBaseLayer==='topo'?'active':''}" data-layer="topo">⛰ Topográfico</span>
                </div>
                <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;">Feições coletadas: <strong>${APP_STATE.collectedFeatures.length}</strong></div>
                <button class="btn small danger" onclick="window._clearAllFeatures()">🗑 Limpar Todas as Feições</button>
                <br><br>
                <button class="btn small" onclick="closeModal()" style="width:100%;">Fechar</button>
                `;
                openModal(html);
                // Add layer chip listeners after DOM update
                setTimeout(() => {
                    document.querySelectorAll('.layer-chip').forEach(chip => {
                        chip.addEventListener('click', function() {
                            const layer = this.dataset.layer;
                            setBaseLayer(layer);
                            document.querySelectorAll('.layer-chip').forEach(c => c
                                .classList.remove('active'));
                            this.classList.add('active');
                            closeModal();
                            showToast(`Camada: ${layer}`, 'success');
                        });
                    });
                }, 100);
            }

            window._clearAllFeatures = function() {
                if (confirm('Deseja realmente excluir TODAS as feições coletadas?')) {
                    APP_STATE.collectedFeatures = [];
                    refreshCollectedLayer();
                    saveFeatures();
                    updateCalculations();
                    closeModal();
                    showToast('Todas as feições foram removidas', 'error');
                }
            };

            function openProjectsModal() {
                const projects = APP_STATE.projects;
                let listHTML = projects.map(p => `
                <div class="list-item" data-project-id="${p.id}">
                    <div>
                        <strong>${p.name}</strong>
                        <div style="font-size:10px;color:var(--text-muted);">${p.featureCount||0} feições · ${new Date(p.updatedAt).toLocaleDateString()}</div>
                    </div>
                    <span style="color:var(--accent);">${APP_STATE.currentProject&&APP_STATE.currentProject.id===p.id?'✓ Ativo':''}</span>
                </div>
                `).join('');
                const html = `
                <div class="modal-title">📁 Projetos</div>
                ${listHTML}
                <div style="margin-top:12px;display:flex;gap:6px;">
                    <input type="text" id="new-project-name" placeholder="Nome do novo projeto" style="flex:1;">
                    <button class="btn primary small" id="btn-create-project">+ Criar</button>
                </div>
                <br>
                <div class="btn-group">
                    <button class="btn small" id="btn-export-geojson">📥 GeoJSON</button>
                    <button class="btn small" id="btn-export-kml">📥 KML</button>
                    <button class="btn small" id="btn-export-gpx">📥 GPX</button>
                    <button class="btn small" id="btn-export-csv">📥 CSV</button>
                    <button class="btn small" id="btn-import">📤 Importar</button>
                </div>
                <br>
                <button class="btn small" onclick="closeModal()" style="width:100%;">Fechar</button>
                `;
                openModal(html);
                setTimeout(() => {
                    document.querySelectorAll('#modal-sheet .list-item').forEach(item => {
                        item.addEventListener('click', function() {
                            const pid = this.dataset.projectId;
                            setCurrentProject(pid);
                            closeModal();
                            showToast('Projeto alterado', 'success');
                        });
                    });
                    document.getElementById('btn-create-project')?.addEventListener('click', () => {
                        const nameInput = document.getElementById('new-project-name');
                        const name = nameInput.value.trim();
                        if (name) {
                            createProject(name);
                            closeModal();
                            showToast(`Projeto "${name}" criado!`, 'success');
                        }
                    });
                    document.getElementById('btn-export-geojson')?.addEventListener('click', () => {
                        exportGeoJSON();
                        closeModal();
                    });
                    document.getElementById('btn-export-kml')?.addEventListener('click', () => { exportKML();
                        closeModal(); });
                    document.getElementById('btn-export-gpx')?.addEventListener('click', () => { exportGPX();
                        closeModal(); });
                    document.getElementById('btn-export-csv')?.addEventListener('click', () => { exportCSV();
                        closeModal(); });
                    document.getElementById('btn-import')?.addEventListener('click', () => { triggerImport();
                        closeModal(); });
                }, 100);
            }

            function openSettingsModal() {
                const html = `
                <div class="modal-title">⚙️ Configurações</div>
                <div style="margin-bottom:8px;font-size:12px;">Modo de coleta padrão:</div>
                <div class="btn-group" style="margin-bottom:12px;">
                    <button class="btn small ${APP_STATE.activeCollectionMode==='point'?'active':''}" id="set-mode-point">📍 Ponto</button>
                    <button class="btn small ${APP_STATE.activeCollectionMode==='line'?'active':''}" id="set-mode-line">📏 Linha</button>
                    <button class="btn small ${APP_STATE.activeCollectionMode==='polygon'?'active':''}" id="set-mode-polygon">📐 Polígono</button>
                </div>
                <div style="margin-bottom:8px;font-size:12px;">Auto-centralizar: 
                    <strong>${APP_STATE.settings.autoCenter?'Ligado':'Desligado'}</strong>
                </div>
                <button class="btn small" id="toggle-autocenter">Alternar Auto-Centralizar</button>
                <br><br>
                <button class="btn small" onclick="closeModal()" style="width:100%;">Fechar</button>
                `;
                openModal(html);
                setTimeout(() => {
                    document.getElementById('set-mode-point')?.addEventListener('click', () => {
                        APP_STATE.activeCollectionMode = 'point';
                        APP_STATE.activeLinePoints = [];
                        APP_STATE.activePolygonPoints = [];
                        activeDrawLayer.clearLayers();
                        document.getElementById('fab-capture').classList.remove('active');
                        updateCaptureButtonIcon();
                        closeModal();
                        showToast('Modo: Ponto', 'success');
                    });
                    document.getElementById('set-mode-line')?.addEventListener('click', () => {
                        startLineMode();
                        closeModal();
                    });
                    document.getElementById('set-mode-polygon')?.addEventListener('click', () => {
                        startPolygonMode();
                        closeModal();
                    });
                    document.getElementById('toggle-autocenter')?.addEventListener('click', () => {
                        APP_STATE.settings.autoCenter = !APP_STATE.settings.autoCenter;
                        closeModal();
                        showToast(`Auto-centralizar: ${APP_STATE.settings.autoCenter?'ON':'OFF'}`,
                            'success');
                    });
                }, 100);
            }

            // ==================== EVENT LISTENERS ====================
            document.getElementById('fab-capture').addEventListener('click', () => {
                if (APP_STATE.activeCollectionMode === 'point') {
                    capturePoint();
                } else if (APP_STATE.activeCollectionMode === 'line') {
                    captureLinePoint();
                } else if (APP_STATE.activeCollectionMode === 'polygon') {
                    capturePolygonPoint();
                }
            });

            // Long press on capture button to finish line/polygon
            let longPressTimer;
            const fabCapture = document.getElementById('fab-capture');
            fabCapture.addEventListener('touchstart', (e) => {
                if (APP_STATE.activeCollectionMode === 'line' || APP_STATE.activeCollectionMode ===
                    'polygon') {
                    longPressTimer = setTimeout(() => {
                        if (APP_STATE.activeCollectionMode === 'line') finishLine();
                        if (APP_STATE.activeCollectionMode === 'polygon') finishPolygon();
                        document.getElementById('fab-capture').classList.remove('active');
                        APP_STATE.activeCollectionMode = 'point';
                        updateCaptureButtonIcon();
                        navigator.vibrate && navigator.vibrate(50);
                    }, 800);
                }
            });
            fabCapture.addEventListener('touchend', () => clearTimeout(longPressTimer));
            fabCapture.addEventListener('touchmove', () => clearTimeout(longPressTimer));
            fabCapture.addEventListener('mousedown', (e) => {
                if (APP_STATE.activeCollectionMode === 'line' || APP_STATE.activeCollectionMode ===
                    'polygon') {
                    longPressTimer = setTimeout(() => {
                        if (APP_STATE.activeCollectionMode === 'line') finishLine();
                        if (APP_STATE.activeCollectionMode === 'polygon') finishPolygon();
                        document.getElementById('fab-capture').classList.remove('active');
                        APP_STATE.activeCollectionMode = 'point';
                        updateCaptureButtonIcon();
                    }, 800);
                }
            });
            fabCapture.addEventListener('mouseup', () => clearTimeout(longPressTimer));
            fabCapture.addEventListener('mouseleave', () => clearTimeout(longPressTimer));

            document.getElementById('fab-center').addEventListener('click', () => {
                if (APP_STATE.gnssPosition) {
                    map.setView([APP_STATE.gnssPosition.latitude, APP_STATE.gnssPosition.longitude], Math.max(
                        map.getZoom(), 18), { animate: true, duration: 0.5 });
                    showToast('📍 Posição centralizada', 'success');
                } else {
                    showToast('Sem posição GNSS', 'error');
                }
            });

            document.getElementById('fab-layers').addEventListener('click', openLayersModal);
            document.getElementById('fab-measure').addEventListener('click', toggleMeasureMode);
            document.getElementById('fab-settings').addEventListener('click', openSettingsModal);
            document.getElementById('project-chip').addEventListener('click', openProjectsModal);
            document.getElementById('panel-header').addEventListener('click', () => {
                document.getElementById('bottom-panel').classList.toggle('collapsed');
            });

            document.getElementById('file-input').addEventListener('change', handleFileImport);

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === 'c' && !e.ctrlKey && !e.metaKey && document.activeElement === document.body) {
                    document.getElementById('fab-capture').click();
                }
                if (e.key === 'Escape') {
                    if (APP_STATE.isMeasuring) toggleMeasureMode();
                    if (APP_STATE.activeCollectionMode !== 'point') {
                        if (APP_STATE.activeCollectionMode === 'line') finishLine();
                        if (APP_STATE.activeCollectionMode === 'polygon') finishPolygon();
                        APP_STATE.activeCollectionMode = 'point';
                        document.getElementById('fab-capture').classList.remove('active');
                        updateCaptureButtonIcon();
                    }
                    closeModal();
                }
            });

            // ==================== UTILS ====================
            function generateUUID() {
                return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                    const r = Math.random() * 16 | 0;
                    const v = c === 'x' ? r : (r & 0x3 | 0x8);
                    return v.toString(16);
                });
            }

            // ==================== INIT ====================
            async function init() {
                await openDB();
                await loadAllData();
                startGNSS();
                updateUI();
                // Expand bottom panel initially on mobile
                if (window.innerWidth < 768) {
                    document.getElementById('bottom-panel').classList.remove('collapsed');
                }
                console.log('🌍 GeoSense GNSS inicializado com sucesso!');
                console.log(`   Projeto: ${APP_STATE.currentProject?.name||'Padrão'}`);
                console.log(`   Feições carregadas: ${APP_STATE.collectedFeatures.length}`);
                console.log('   Modo: ' + APP_STATE.activeCollectionMode);
            }

            init();

            // Cleanup on page unload
            window.addEventListener('beforeunload', () => {
                stopGNSS();
                saveFeatures();
                saveProjects();
            });

            console.log('%c🛰 GeoSense GNSS %c v1.0 %c| Coleta Geoespacial Profissional',
                'font-size:16px;font-weight:bold;color:#4da6ff;',
                'font-size:12px;color:#34d399;',
                'font-size:11px;color:#a0a6b0;');
            console.log('%c📋 Comandos: %cClique no botão azul para capturar | Pressione e segure para finalizar linha/polígono | Esc para cancelar',
                'color:#fbbf24;', 'color:#e1e4e8;');
        })();
    </script>
