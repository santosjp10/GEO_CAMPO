name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: List files for debug
        run: ls -la

      - name: Install dependencies
        run: npm install

      - name: Prepare web assets
        run: |
          mkdir -p www
          # Copia index.html se existir
          if [ -f index.html ]; then
            cp index.html www/
          else
            echo "ERRO: index.html não encontrado na raiz!"
            exit 1
          fi
          # Copia outros arquivos estáticos se existirem (ex: assets, css, js)
          cp -r ./*.css ./*.js ./*.png ./*.jpg ./*.svg ./assets ./images 2>/dev/null || true

      - name: Init Capacitor
        run: npx cap init "GeoSense GNSS" com.seudominio.geosense --web-dir www

      - name: Add Android
        run: npx cap add android

      - name: Sync
        run: npx cap sync

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
